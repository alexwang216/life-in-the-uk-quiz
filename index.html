<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life in the UK Quiz</title>
    <script>
      // Companion to public/404.html — restores the URL after the GitHub Pages
      // SPA redirect so React Router sees the correct path.
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]+)/);
        if (p) {
          var decoded = decodeURIComponent(p[1]);
          window.history.replaceState(null, null, '/' + decoded);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
