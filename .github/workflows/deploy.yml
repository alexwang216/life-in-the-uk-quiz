name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need the last 2 commits to read the latest commit message

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version based on conventional commit
        # WHY: We read the latest commit message and decide how to bump:
        #   feat:           → minor bump  (e.g. 1.0.0 → 1.1.0)  new feature
        #   fix:            → patch bump  (e.g. 1.0.0 → 1.0.1)  bug fix
        #   BREAKING CHANGE → major bump  (e.g. 1.0.0 → 2.0.0)  breaking change
        #   anything else   → patch bump  (default)
        # `npm version` updates package.json and creates a git tag, but we use
        # --no-git-tag-version to skip the tag (keeps the workflow simple).
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "Commit message: $MSG"
          if echo "$MSG" | grep -qiE "^BREAKING CHANGE|BREAKING CHANGE:"; then
            BUMP=major
          elif echo "$MSG" | grep -qiE "^feat(\(.*\))?:"; then
            BUMP=minor
          else
            BUMP=patch
          fi
          echo "Bumping: $BUMP"
          npm version $BUMP --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
